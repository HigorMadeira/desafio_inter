services:
  postgres:
    image: postgres:16-alpine
    container_name: desafio_inter_postgres
    environment:
      POSTGRES_DB: desafio_inter
      POSTGRES_USER: desafio_user
      POSTGRES_PASSWORD: desafio_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desafio_user -d desafio_inter"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: desafio_inter_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: desafio_inter
      DB_USER: desafio_user
      DB_PASSWORD: desafio_pass
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: desafio_inter_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
